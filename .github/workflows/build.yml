name: build

# Builds the Fabric mod jar and the standalone installer on every push and pull request,
# and attaches both to a GitHub Release when a version tag is pushed. The only Minecraft
# code that ever ships is none: the mod jar carries no repackaged game, and the installer
# downloads Fabric and the jar on the player's own machine, per the project ground rules.

# Tags only. Ordinary commits to main do not build: this is a personal client with a
# tag-driven release flow, so a run per commit is spend with nothing to publish at the end
# of it. workflow_dispatch stays so the pipeline can still be exercised from the Actions tab
# without inventing a throwaway tag.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      # Staged by an explicit name test rather than a glob. The obvious shorthand for "not
      # the sources jar", build/libs/*[!sources].jar, is a character class that happens to
      # work: it matches one trailing character outside {s,o,u,r,c,e}, so a version ending
      # in any of those letters (0.3.0-pre) would silently exclude the mod jar itself and
      # fail the release.
      - name: Stage the mod jar
        run: |
          set -eu
          mkdir -p dist
          find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' -exec cp {} dist/ \;
          ls -1 dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: esdeath-cryostasis
          # The runnable mod jar only, no sources jar.
          path: dist/*.jar
          if-no-files-found: error

      - name: Attach jar to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar
          fail_on_unmatched_files: true

  # The installer is a separate artifact with its own toolchain: a static Go binary per
  # platform, so players do not need Java on PATH just to run the thing that installs the
  # mod. It reads the release it is attached to, so it must ship in the same release.
  #
  # It builds from the repository root, not installer/, because the download and profile logic
  # now lives in the shared internal/engine package (the launcher shares it), and the engine's
  # tests only run when `go test ./...` is invoked from the module root.
  installer:
    runs-on: ubuntu-latest
    # Serialized behind the mod build for two reasons: both jobs attach to the same release,
    # and action-gh-release creates it when absent, so running them together races to create
    # the same tag. It also stops installers shipping in a release whose mod jar failed.
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          # The root module (engine plus installer) has no third-party dependencies, so there is
          # no go.sum and nothing to cache. The Wails dependency lives in the separate launcher
          # module and never enters this build. Left on, the cache step fails looking for a sum.
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build every platform
        run: |
          set -eu
          mkdir -p installer/dist
          build() {
            GOOS="$1" GOARCH="$2" CGO_ENABLED=0 \
              go build -trimpath -ldflags '-s -w' -o "installer/dist/$3" ./installer
          }
          build windows amd64 esdeath-installer-windows-amd64.exe
          build linux   amd64 esdeath-installer-linux-amd64
          build darwin  amd64 esdeath-installer-macos-intel
          build darwin  arm64 esdeath-installer-macos-apple-silicon

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esdeath-installer
          path: installer/dist/*
          if-no-files-found: error

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/*
          fail_on_unmatched_files: true

  # The backend container is the third shippable, and the odd one out: it does not attach to
  # the GitHub Release, it publishes to GHCR so a `docker compose pull` can redeploy it. It is
  # independent of the mod jar, so no `needs` - it runs alongside build/installer. Nothing here
  # races on the release, so there is no serialization to worry about.
  backend-image:
    name: Backend image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Least privilege: this job writes to the package registry, not the release. It overrides
    # the workflow-level `contents: write`, so it must re-grant `contents: read` to check out.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gate the image on the suite the same way the mod ships behind `gradle build`: a broken
      # backend must never reach `:latest`, because a redeploy pulls that tag blind. The suite
      # needs no database - it runs against repo/memory.py.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          set -eu
          pip install -e ".[dev]"
          pytest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is scoped to this repo's packages by the `packages: write` grant above; no
      # PAT needed as long as the image lives under the same owner.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Hardcoded lowercase owner: GHCR rejects uppercase, and github.repository_owner is the
      # login verbatim (4G0NYY), which would need lowercasing anyway. The compose file pins
      # this exact path, so pinning it here keeps the two in lockstep.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/4g0nyy/cryostasis-backend
          # On a v* tag: 1.2.3, 1.2, and latest. workflow_dispatch produces no tags and does
          # not push (see `push:` below), so it only validates that the image still builds.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          # Only tag builds publish. A dispatch run builds to catch breakage but pushes nothing,
          # mirroring how the mod and installer only attach to a release on a tag.
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The desktop launcher is a Wails app: a native GUI binary per platform, so unlike the
  # cross-compiled installer it has to be built on each OS natively (each needs its own webview
  # and toolchain). It lives in its own Go module (launcher/) with the Wails dependency, kept
  # apart from the installer's dependency-free build. Like the installer it attaches to the
  # release, so it is serialized behind the mod build to avoid racing to create the tag.
  #
  # New and not yet exercised by a real tag, so the first release may need a tweak here, the
  # same caveat that applies to the backend image. fail-fast is off so one platform's failure
  # does not cancel the others.
  launcher:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            asset: esdeath-launcher-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            asset: esdeath-launcher-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            asset: esdeath-launcher-macos.zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # bash everywhere, including the Windows runner (Git Bash), so one set of shell steps
        # works across all three. Every step runs from the launcher module.
        shell: bash
        working-directory: launcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux is the only platform whose webview is not part of the OS: Wails renders through
      # WebKitGTK, so its dev packages have to be installed before the build.
      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Pinned to the version the go.mod requires so the CLI and the runtime never drift apart.
      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # wails build runs the frontend install and build first (per wails.json), then the Go
      # build with the embedded dist, then packages the native binary into build/bin.
      #
      # -tags webkit2_41 is required on Linux: ubuntu-latest (24.04) ships only the WebKitGTK
      # 4.1 dev package, but Wails links against 4.0 by default, so pkg-config would fail
      # looking for the absent webkit2gtk-4.0.pc. The tag switches it to the 4.1 bindings we
      # install above. It is inert on Windows and macOS, whose webviews are part of the OS.
      - name: Build
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -clean -o esdeath-cryostasis-launcher

      # Normalise the platform-specific output into one asset name. macOS produces a .app
      # bundle (a directory), so it is zipped; the others are single binaries renamed in place.
      - name: Package
        run: |
          set -eu
          cd build/bin
          if [ "${{ runner.os }}" = "macOS" ]; then
            zip -r "${{ matrix.asset }}" ./*.app
          elif [ "${{ runner.os }}" = "Windows" ]; then
            # -o sets the output name verbatim, so Wails does not append .exe on Windows the
            # way it would by default; the binary lands as esdeath-cryostasis-launcher, no
            # extension. Rename that (not a phantom .exe) to the .exe asset name.
            mv esdeath-cryostasis-launcher "${{ matrix.asset }}"
          else
            mv esdeath-cryostasis-launcher "${{ matrix.asset }}"
          fi

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: esdeath-launcher-${{ runner.os }}
          path: launcher/build/bin/${{ matrix.asset }}
          if-no-files-found: error

      - name: Attach launcher to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/build/bin/${{ matrix.asset }}
          fail_on_unmatched_files: true
